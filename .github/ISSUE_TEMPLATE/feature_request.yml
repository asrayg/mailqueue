name: "✨ Feature request"
description: Suggest an idea or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like MailQueue to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Confirmation
      options:
        - label: This request is compatible with MailQueue's anti-spam stance (no bypassing CAPTCHA/2FA/rate limits, no mass spam).
          required: true
