name: "🐛 Bug report"
description: Something isn't working as expected.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands you ran (prefer `--json` output) and the result.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where?
      options: [CLI, dashboard, worker/scheduler, provider automation, other]
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Node version (`node -v`), MailQueue version / commit.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Confirmation
      options:
        - label: This is about legitimate outreach use — not a request to bypass provider anti-abuse systems.
          required: true
